type: object
properties:
  code:
    type: integer
    description: HTTP-code error
    example: 404
  message:
    type: string
    description: Description of error
    example: >
      "Order for uuid '123e4567-e89b-12d3-a456-426614174000' not found."
      "One or more parts not found."
required:
  - code
  - message
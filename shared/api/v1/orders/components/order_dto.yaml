type: object
properties:
  order_uuid:
    type: string
    description: UUID of order
    example: 123e4567-e89b-12d3-a456-426614174000
  user_uuid:
    type: string
    description: User`s UUID
    example: 123e4567-e89b-12d3-a456-426614174000
  part_uuids:
    type: array
    items:
      type: string
    minItems: 1
    description: Array of part uuids.
    example:
      - "321e4567-e89b-12d3-a456-426614174000"
      - "654e4567-e89b-12d3-a456-426614174000"
  total_price: 
    type: number
    format: double
    description: Total coast of all parts in the order.
    example: 123.45
  transaction_uuid:
    type: string
    nullable: true
    description: Transaction`s UUID (if paid)
    example: "123e4567-e89b-12d3-a456-426614174000"
  payment_method:
    allOf:
      - $ref: ./enums/payment_method.yaml
      - type: string
        nullable: true
        description: The way of payment (if paid).
  status:
    allOf:
      - $ref: ./enums/order_status.yaml
      - type: string
        description: Order status. One of PENDING_PAYMENT, PAID, CANCELLED.
required:
  - order_uuid
  - user_uuid
  - part_uuids
  - total_price
  - status
